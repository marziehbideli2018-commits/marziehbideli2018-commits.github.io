<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marzieh Abbasi</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>

/* ====== کد خودت (بدون تغییر) ====== */
* { margin:0; padding:0; box-sizing:border-box; font-family:'Inter',sans-serif; }

body {
    background:#020617; color:#fff; overflow-x:hidden; position:relative;
    scroll-behavior: smooth;
}

/* Background */
body::before {
    content:''; position:fixed; inset:0;
    background: radial-gradient(circle at 25% 20%, rgba(139,92,246,0.22) 0%, transparent 60%),
                radial-gradient(circle at 75% 75%, rgba(168,85,247,0.20) 0%, transparent 65%);
    z-index:-2; filter:blur(90px);
}
body::after {
    content:''; position:fixed; inset:0;
    background-image: radial-gradient(white 1px, transparent 2px),
                      radial-gradient(white 1px, transparent 2px);
    background-size: 160px 160px, 100px 100px;
    opacity:0.18; z-index:-1;
}

/* NAV */
nav {
    display:flex; justify-content:space-between; padding:25px 80px;
    position:fixed; width:100%; background:rgba(2,6,23,0.9);
    backdrop-filter:blur(16px); z-index:1000;
}
nav .logo { font-weight:700; font-size:23px; background:linear-gradient(90deg,#a855f7,#c084fc); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }

.menu { display:flex; }

nav a { color:#ccc; margin-left:32px; text-decoration:none; font-size:14.8px; position:relative; }
nav a.active { color:#a855f7; }

nav a.active::after {
    content:''; position:absolute; bottom:-6px; left:0; width:100%; height:2.5px;
    background:#a855f7; box-shadow:0 0 12px #a855f7;
}

/* ====== ADD-ON حرفه‌ای ====== */

/* دکمه موبایل */
.menu-toggle{
    display:none;
    font-size:26px;
    cursor:pointer;
}

/* انیمیشن */
.fade{
    opacity:0;
    transform:translateY(40px);
    transition:0.7s;
}
.fade.show{
    opacity:1;
    transform:translateY(0);
}

/* موبایل */
@media(max-width:900px){

nav{
    padding:15px 20px;
}

.menu{
    position:fixed;
    top:70px;
    right:-100%;
    width:240px;
    height:100vh;
    background:#020617;
    flex-direction:column;
    padding:30px;
    gap:25px;
    transition:0.4s;
}
.menu.active{
    right:0;
}

.menu-toggle{
    display:block;
}

.hero{
    flex-direction:column;
    padding:120px 20px;
    text-align:center;
}

.left,.right{
    width:100% !important;
}

.card{
    min-height:auto !important;
}

.stats{
    flex-wrap:wrap;
}

.stat{
    flex:1 1 45%;
}

.grid{
    grid-template-columns:1fr;
}

}

</style>
</head>

<body>

<nav>
    <div class="logo">MA.</div>

    <div class="menu">
        <a href="#home" class="active">Home</a>
        <a href="#about">About</a>
        <a href="#skills">Skills</a>
        <a href="#projects">Projects</a>
    </div>

    <div class="menu-toggle" onclick="toggleMenu()">
        <i class="fas fa-bars"></i>
    </div>
</nav>

<!-- 👇 اینجا مهمه: کل محتوای اصلی -->

<section id="home" class="hero fade">
    <div class="left">
        <div class="profile">
            <img src="profile.jpg" style="width:100%;height:100%;object-fit:cover;">
        </div>
        <h1>Marzieh <span>Abbasi</span></h1>
        <p class="subtitle">Computer Engineering Student</p>
    </div>

    <div class="right">
        <div class="card">
            <h2>About me</h2>
            <p>Your original content here (بدون حذف)</p>
        </div>
    </div>
</section>

<footer>© 2026 Marzieh Abbasi Bideli</footer>

<script>
function toggleMenu(){
    document.querySelector(".menu").classList.toggle("active");
}

const items = document.querySelectorAll('.fade');
window.addEventListener('scroll', () => {
    items.forEach(el => {
        const top = el.getBoundingClientRect().top;
        if(top < window.innerHeight - 80){
            el.classList.add('show');
        }
    });
});
</script>

</body>
</html>
